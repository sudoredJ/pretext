<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII DOOM — Pretext</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { display: flex; align-items: center; justify-content: center; }
    #scene {
      font: 12px/14px "Courier New", Courier, monospace;
      white-space: pre;
      user-select: none;
      cursor: crosshair;
    }
    .r { display: block; height: 14px; }
    #logo {
      position: fixed;
      top: 40px; left: 40px;
      width: 200px; height: auto;
      cursor: grab;
      user-select: none;
      z-index: 20;
      filter: drop-shadow(0 0 14px rgba(255,30,10,0.5));
    }
    #logo:active { cursor: grabbing; }
    #hint {
      position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
      font: 12px sans-serif; color: rgba(255,255,255,0.25);
      pointer-events: none; transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <div id="scene"></div>
  <img id="logo" draggable="false" style="display:none" alt="DOOM">
  <div id="hint">Click to look — WASD move — Space shoot — Drag the logo!</div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
